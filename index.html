<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高级科学计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Consolas, monospace;
            transition: background-color 0.3s, color 0.3s;
        }

        :root {
            --bg-main: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-color: #f1f5f9;
            --btn-normal: rgba(71, 85, 105, 0.4);
            --btn-op: rgba(59, 130, 246, 0.5);
            --btn-clear: rgba(220, 38, 38, 0.6);
            --btn-eq: rgba(16, 185, 129, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        .light-mode {
            --bg-main: #e2e8f0;
            --card-bg: rgba(255, 255, 255, 0.7);
            --text-color: #0f172a;
            --btn-normal: rgba(203, 213, 225, 0.7);
            --border-color: rgba(0, 0, 0, 0.1);
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg-main);
            padding: 20px;
        }

        .container {
            backdrop-filter: blur(16px);
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 26px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.25);
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .title {
            color: var(--text-color);
            font-size: 18px;
        }

        #themeBtn {
            padding: 6px 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: var(--btn-normal);
            color: var(--text-color);
        }

        #history {
            color: var(--text-color);
            opacity: 0.6;
            text-align: right;
            min-height: 22px;
            font-size: 14px;
            padding-right: 8px;
        }

        #display {
            width: 100%;
            padding: 16px 12px;
            margin-bottom: 18px;
            font-size: 30px;
            text-align: right;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            background: transparent;
            color: var(--text-color);
            outline: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }

        button {
            padding: 14px 0;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-color);
            background: var(--btn-normal);
        }

        button:active {
            transform: scale(0.95);
        }

        .op { background: var(--btn-op); }
        .ac { background: var(--btn-clear); }
        .equal {
            background: var(--btn-eq);
            grid-column: span 2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <div class="title">科学计算器</div>
            <button id="themeBtn">切换主题</button>
        </div>
        <div id="history"></div>
        <input type="text" id="display" readonly>
        <div class="grid">
            <button class="ac" onclick="clearAll()">AC</button>
            <button onclick="backspace()">⌫</button>
            <button class="op" onclick="append('/')">÷</button>
            <button class="op" onclick="append('*')">×</button>
            <button onclick="calcFunc('sqrt')">√</button>

            <button onclick="append('7')">7</button>
            <button onclick="append('8')">8</button>
            <button onclick="append('9')">9</button>
            <button class="op" onclick="append('-')">-</button>
            <button onclick="calcFunc('pow2')">x²</button>

            <button onclick="append('4')">4</button>
            <button onclick="append('5')">5</button>
            <button onclick="append('6')">6</button>
            <button class="op" onclick="append('+')">+</button>
            <button onclick="calcFunc('sin')">sin</button>

            <button onclick="append('1')">1</button>
            <button onclick="append('2')">2</button>
            <button onclick="append('3')">3</button>
            <button onclick="calcFunc('cos')">cos</button>
            <button onclick="calcFunc('tan')">tan</button>

            <button onclick="append('0')">0</button>
            <button onclick="append('.')">.</button>
            <button class="equal" onclick="getResult()">=</button>
        </div>
    </div>

    <script>
        const disp = document.getElementById('display');
        const historyBox = document.getElementById('history');
        const themeBtn = document.getElementById('themeBtn');
        let historyExp = '';

        // 明暗主题切换
        themeBtn.onclick = () => {
            document.body.classList.toggle('light-mode');
        };

        // 追加字符
        function append(v) {
            disp.value += v;
        }

        // 清空
        function clearAll() {
            disp.value = '';
            historyBox.textContent = '';
            historyExp = '';
        }

        // 退格
        function backspace() {
            disp.value = disp.value.slice(0, -1);
        }

        // 基础运算结果
        function getResult() {
            try {
                let exp = disp.value.replace(/×/g, '*').replace(/÷/g, '/');
                historyExp = disp.value;
                historyBox.textContent = historyExp + " =";
                let res = eval(exp);
                disp.value = Number(res.toFixed(8));
            } catch {
                disp.value = "错误";
            }
        }

        // 科学函数计算
        function calcFunc(type) {
            try {
                let num = parseFloat(disp.value);
                let result;
                switch(type) {
                    case 'sqrt': result = Math.sqrt(num); break;
                    case 'pow2': result = num ** 2; break;
                    case 'sin': result = Math.sin(num * Math.PI / 180); break;
                    case 'cos': result = Math.cos(num * Math.PI / 180); break;
                    case 'tan': result = Math.tan(num * Math.PI / 180); break;
                }
                disp.value = Number(result.toFixed(8));
            } catch {
                disp.value = "错误";
            }
        }

        // 键盘按键支持
        document.addEventListener('keydown', e => {
            const key = e.key;
            if (!isNaN(key) || '+-*/.'.includes(key)) append(key);
            if (key === 'Enter') getResult();
            if (key === 'Escape') clearAll();
            if (key === 'Backspace') backspace();
        });
    </script>
</body>
</html>

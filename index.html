<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>网页在线URL播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        body {
            background-color: #121212;
            color: #fff;
            padding: 30px 15px;
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #ffffff;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        #videoUrl {
            flex: 1;
            padding: 12px 16px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            background: #1e1e1e;
            color: #fff;
            outline: 2px solid transparent;
        }
        #videoUrl:focus {
            outline-color: #2563eb;
        }
        #playBtn {
            padding: 12px 24px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        #playBtn:hover {
            background: #1d4ed8;
        }
        .player-box {
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }
        video {
            width: 100%;
            display: block;
        }
        .tip {
            margin-top: 15px;
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <h1>在线URL视频播放器</h1>

    <div class="input-area">
        <input type="text" id="videoUrl" placeholder="粘贴MP4、WebM等直链视频地址">
        <button id="playBtn">开始播放</button>
    </div>

    <div class="player-box">
        <video id="player" controls></video>
    </div>

    <p class="tip">
        注意：仅支持**直接视频源链接**（.mp4 /.webm /.ogg），不支持B站、爱奇艺、腾讯视频等加密网页链接，存在跨域限制无法播放。
    </p>

    <script>
        const urlInput = document.getElementById('videoUrl');
        const playBtn = document.getElementById('playBtn');
        const player = document.getElementById('player');

        playBtn.addEventListener('click', () => {
            const url = urlInput.value.trim();
            if (!url) {
                alert('请输入视频链接');
                return;
            }
            player.src = url;
            player.load();
            player.play().catch(err => {
                console.log('自动播放被浏览器限制，手动点击播放按钮', err);
            });
        });

        // 回车快速播放
        urlInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') playBtn.click();
        });
    </script>
</body>
</html>

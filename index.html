<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写给你的告白</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #0a0a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-family: "Microsoft Yahei", sans-serif;
            position: relative;
        }
        .content-box {
            z-index: 99;
            text-align: center;
            transition: transform 0.6s ease;
        }
        .content-box.success {
            transform: scale(1.6);
        }
        h1 {
            color: #ff6b8b;
            font-size: 2.2rem;
            margin-bottom: 16px;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.8;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        #acceptBtn {
            background-color: #ff477e;
            color: white;
        }
        #refuseBtn {
            background-color: #666;
            color: white;
            position: relative;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>
    <div class="content-box" id="mainBox">
        <h1>我喜欢你很久啦</h1>
        <p>世界很大，人海茫茫<br>
        可我的目光，只会不自觉落在你身上<br>
        愿意给我一个机会，陪你走下去吗？</p>
        <div class="btn-group">
            <button id="acceptBtn">接受❤️</button>
            <button id="refuseBtn">拒绝</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        // 飘落爱心背景
        class Heart {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() - height;
                this.size = Math.random() * 12 + 6;
                this.speedY = Math.random() * 1.2 + 0.6;
                this.speedX = (Math.random() - 0.5) * 0.8;
                this.opacity = Math.random() * 0.5 + 0.3;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.bezierCurveTo(-this.size, -this.size, -this.size * 1.8, 0, 0, this.size);
                ctx.bezierCurveTo(this.size * 1.8, 0, this.size, -this.size, 0, 0);
                ctx.fillStyle = `rgba(255, 107, 139, ${this.opacity})`;
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                if (this.y > height) {
                    this.y = -20;
                    this.x = Math.random() * width;
                }
            }
        }

        const hearts = [];
        for (let i = 0; i < 80; i++) {
            hearts.push(new Heart());
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            hearts.forEach(h => {
                h.update();
                h.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        // 按钮逻辑
        const acceptBtn = document.getElementById('acceptBtn');
        const refuseBtn = document.getElementById('refuseBtn');
        const mainBox = document.getElementById('mainBox');

        // 拒绝按钮随机乱跑
        refuseBtn.addEventListener('mouseenter', () => {
            const maxX = window.innerWidth - refuseBtn.offsetWidth - 20;
            const maxY = window.innerHeight - refuseBtn.offsetHeight - 20;
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            refuseBtn.style.left = randomX + 'px';
            refuseBtn.style.top = randomY + 'px';
        });

        // 接受后放大页面，隐藏拒绝按钮
        acceptBtn.addEventListener('click', () => {
            mainBox.classList.add('success');
            refuseBtn.style.display = 'none';
            setTimeout(() => {
                alert('太好了！以后要一直在一起 ❤️');
            }, 700);
        });
    </script>
</body>
</html>
